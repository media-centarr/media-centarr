# ═══════════════════════════════════════════════════════════
# HISTORY (memo script)
# ═══════════════════════════════════════════════════════════
h script-binding memo-history

# ═══════════════════════════════════════════════════════════
# PLAYBACK
# ═══════════════════════════════════════════════════════════
SPACE cycle pause

# ═══════════════════════════════════════════════════════════
# SEEK
# ═══════════════════════════════════════════════════════════
LEFT seek -5
RIGHT seek 5
DOWN seek -30
UP seek 30
Shift+LEFT seek -1 exact
Shift+RIGHT seek 1 exact

# ═══════════════════════════════════════════════════════════
# PLAYBACK SPEED
# ═══════════════════════════════════════════════════════════
[ multiply speed 0.9
] multiply speed 1.1
BS set speed 1.0

# ═══════════════════════════════════════════════════════════
# VOLUME
# ═══════════════════════════════════════════════════════════
WHEEL_UP add volume 5
WHEEL_DOWN add volume -5
m cycle mute

# ═══════════════════════════════════════════════════════════
# MENU (track selector)
# ═══════════════════════════════════════════════════════════
TAB script-binding track_menu/toggle

# ═══════════════════════════════════════════════════════════
# SUBTITLES
# ═══════════════════════════════════════════════════════════
v cycle sub-visibility
j cycle sub
J cycle sub down
z add sub-delay -0.1
Z add sub-delay 0.1

# ═══════════════════════════════════════════════════════════
# AUDIO
# ═══════════════════════════════════════════════════════════
a cycle audio
Ctrl+z add audio-delay -0.1
Ctrl+Z add audio-delay 0.1

# ═══════════════════════════════════════════════════════════
# WINDOW
# ═══════════════════════════════════════════════════════════
f cycle fullscreen
ESC quit-watch-later
ENTER cycle fullscreen

# ═══════════════════════════════════════════════════════════
# SCREENSHOTS
# ═══════════════════════════════════════════════════════════
s screenshot
S screenshot video

# ═══════════════════════════════════════════════════════════
# PLAYLIST
# ═══════════════════════════════════════════════════════════
< playlist-prev
> playlist-next
l cycle-values loop-file inf no

# ═══════════════════════════════════════════════════════════
# MOUSE
# ═══════════════════════════════════════════════════════════
MBTN_BACK quit-watch-later

# ═══════════════════════════════════════════════════════════
# QUIT
# ═══════════════════════════════════════════════════════════
q quit
Q quit-watch-later
