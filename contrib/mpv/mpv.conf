# ═══════════════════════════════════════════════════════════
# PLAYBACK
# ═══════════════════════════════════════════════════════════
#save-position-on-quit=yes
keep-open=yes

# ═══════════════════════════════════════════════════════════
# SUBTITLES
# ═══════════════════════════════════════════════════════════
alang=en,eng
slang=en,eng
subs-with-matching-audio=forced
subs-fallback=yes
sub-auto=fuzzy
sub-font-size=42

# ═══════════════════════════════════════════════════════════
# GPU / VIDEO RENDERING (NVIDIA + Vulkan)
# ═══════════════════════════════════════════════════════════
gpu-api=vulkan
hwdec=nvdec
vo=gpu-next
profile=gpu-hq

# High-quality scaling
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell

# ═══════════════════════════════════════════════════════════
# OSD & WINDOW
# ═══════════════════════════════════════════════════════════
osc=yes
osd-bar=yes
osd-level=1
osd-duration=2500
autofit-larger=90%x90%
cursor-autohide=1000
input-ar-delay=1000

# ═══════════════════════════════════════════════════════════
# AUDIO
# ═══════════════════════════════════════════════════════════
volume=100
volume-max=150

# ═══════════════════════════════════════════════════════════
# SCREENSHOTS
# ═══════════════════════════════════════════════════════════
screenshot-directory=~/pictures/
screenshot-format=png
